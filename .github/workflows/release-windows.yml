name: Release Windows

on:
  push:
    tags: ['v*', 'V*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

concurrency:
  group: release-windows-${{ inputs.version || github.ref_name }}
  cancel-in-progress: true

jobs:
  release_windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ inputs.version && format('v{0}', inputs.version) || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if git rev-parse -q --verify "refs/tags/$TAG_NAME" >/dev/null 2>&1 || git ls-remote --tags origin "$TAG_NAME" | grep -q "refs/tags/${TAG_NAME}$"; then
            echo "Tag $TAG_NAME already exists, using existing tag."
          else
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: windows/package-lock.json

      - name: Install dependencies
        working-directory: windows
        run: npm ci

      - name: Run tests
        working-directory: windows
        run: npm test

      - name: Set version from tag
        working-directory: windows
        shell: bash
        run: |
          version="${TAG_NAME#v}"
          version="${version#V}"
          # Normalize to valid semver (e.g., 1.1 -> 1.1.0)
          case "$version" in
            *.*.*) ;;
            *.*) version="$version.0" ;;
            *) version="$version.0.0" ;;
          esac
          npm version "$version" --no-git-tag-version --allow-same-version

      - name: Build Windows distributables
        working-directory: windows
        run: npm run dist

      - name: Verify build output
        working-directory: windows
        shell: bash
        run: |
          if ! ls dist/*.exe 1>/dev/null 2>&1; then
            echo "::error::No .exe files found in windows/dist/"
            exit 1
          fi
          echo "Built executables:"
          ls -la dist/*.exe

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: windows/dist/*.exe

      - name: Upload Windows artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            windows/dist/*.exe
