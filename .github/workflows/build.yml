name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: cd macos && swift build -c release

      - name: Run tests
        run: cd macos && swift test

      - name: Build app archives
        run: make release-artifacts

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeUsageBar.zip
          path: macos/ClaudeUsageBar.zip

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeUsageBar.dmg
          path: macos/ClaudeUsageBar.dmg

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: windows/package-lock.json

      - name: Install dependencies
        working-directory: windows
        run: npm ci

      - name: Run tests
        working-directory: windows
        run: npm test

      - name: Build Windows distributables
        working-directory: windows
        run: npm run dist

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeUsageBar-Setup.exe
          path: windows/dist/*.exe
